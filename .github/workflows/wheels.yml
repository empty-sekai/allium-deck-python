name: wheels

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - uses: dtolnay/rust-toolchain@stable
      - run: python -m pip install pytest maturin ruff tomli
      - name: Verify release tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: python -c "import os, pathlib, tomli; version=tomli.loads(pathlib.Path('pyproject.toml').read_text())['project']['version']; assert os.environ['GITHUB_REF_NAME'] == f'v{version}', f'tag must be v{version}'"
      - run: cargo test --release
      - run: ruff check python tests
      - run: PYTHONPATH=python pytest -q tests/test_lunabot_contract.py

  linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          args: --release --out dist
          sccache: true
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist/*.whl
      - uses: actions/setup-python@v5
        if: matrix.target == 'x86_64'
        with:
          python-version: "3.10"
      - if: matrix.target == 'x86_64'
        run: python -m pip install dist/*.whl
      - if: matrix.target == 'x86_64'
        run: python -c "import _allium_deck_native, allium_deck, sekai_deck_recommend_cpp"

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist
          sccache: true
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: dist/*.whl
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - shell: pwsh
        run: python -m pip install (Get-ChildItem dist/*.whl).FullName
      - run: python -c "import _allium_deck_native, allium_deck, sekai_deck_recommend_cpp"

  macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            target: x86_64
          - runner: macos-15
            target: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: true
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist/*.whl
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: python -m pip install dist/*.whl
      - run: python -c "import _allium_deck_native, allium_deck, sekai_deck_recommend_cpp"

  smoke:
    needs: [linux, windows, macos]
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.14"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/download-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: dist
      - run: python -m pip install pytest dist/*.whl
      - run: pytest -q tests/test_lunabot_contract.py
      - run: python -c "import _allium_deck_native, allium_deck, sekai_deck_recommend_cpp"

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, smoke]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
